#-----------------------------------------------------------------------------
# GitHub Actions Workflow for Building, Scanning and Pushing Docker Image 
#-----------------------------------------------------------------------------


#-----------------------------------------------------------------------------
# Step 1: Name of the pipeline
#-----------------------------------------------------------------------------
name: Docker Build, Scan and Push  


#-----------------------------------------------------------------------------
# Step 2: Define the events that will trigger the pipeline
#-----------------------------------------------------------------------------
on:   
  push:
    branches: ["main"]
    paths-ignore:
    - ".githubworkflows/**"
    - "**/*.md"


#-----------------------------------------------------------------------------
# Step 3: Define the global environment variables
#-----------------------------------------------------------------------------
env:
  DOCKER_REPO: daxhian
  IMAGE_NAME: devops-bootcamp-backend
  NEXT_PUBLIC_API_URL: https://localhost:3000


#-----------------------------------------------------------------------------
# Step 4: Define the jobs that will run in the pipeline
#-----------------------------------------------------------------------------
jobs:   
  notify-start:   
    runs-on: ubuntu-latest 
    steps:    
      - name: Slack Notification   
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_INCOMING_WEBHOOK }}
          SLACK_TITLE: Docker build pipeline triggered (Backend)
          SLACK_MESSAGE:  |
                **Repository:** ${{ github.repository }}
                
                **Event:** ${{ github.event_name }}

                **Actor:** ${{ github.actor }}

                **Branch:** ${{ github.ref_name }}

                **Commit:** ${{ github.event.head_commit.message }}

  
  build-scan-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout application code
        uses: actions/checkout@v6

      - name: Set up Docker   
        uses: docker/setup-buildx-action@v4

      - name: Log into Docker Hub  
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_REPO }}  
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Generate Image Tag 
        id: tag 
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}                                                     
          tags: |
            type=sha, format=short 
     
      - name: Build docker image   
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: ${{ steps.tag.outputs.tags }}
          build-args: | 
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}

      - name: Install Trivy
        run: |
          sudo apt-get update
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.69.3 
          
      - name: Scan docker image for vulnerabilities  
        run: |
                trivy image \
                --format table \
                --exit-code 1 \
                --ignore-unfixed \
                --severity CRITICAL,HIGH \
                "${{ steps.tag.outputs.tags }}" \
                | tee trivy-report.txt      
        
      - name: Upload scan report as artifact 
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report 
          path: trivy-report.txt

      - name: Push docker image to Docker Hub
        if: success()
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}

      - name: Slack Notification 
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_INCOMING_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: Docker build, scan and push pipeline successful
          SLACK_MESSAGE: |
                    Docker pipeline *${{ job.status }}*

                    Actor: ${{ github.actor }}

                    Repository: ${{ github.repository }}

                    Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}